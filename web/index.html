<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NIKO'$ - Copa do Mundo 2026">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NIKO'$">

  <link rel="icon" type="image/png" href="favicon.ico" />
  <title>Dá um palpite aí</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #8f0000;
      font-family: Arial, Helvetica, sans-serif;
    }

    #splash-screen {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 86% 10%, rgba(255, 196, 0, 0.20), transparent 40px),
        radial-gradient(circle at 75% 76%, rgba(255, 166, 0, 0.18), transparent 32px),
        radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.08), transparent 26px),
        linear-gradient(135deg, #b60000 0%, #920000 40%, #6d0000 100%);
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    #splash-screen.splash-screen--hide {
      opacity: 0;
      visibility: hidden;
    }

    .cup-bg {
      position: absolute;
      left: 0;
      bottom: 60px;
      width: 220px;
      height: 220px;
      opacity: 0.08;
      animation: floatCup 4s ease-in-out infinite;
    }

    .cup-bg::before {
      content: "🏆";
      display: block;
      font-size: 220px;
      line-height: 1;
    }

    .loading-card {
      position: relative;
      width: min(86vw, 420px);
      padding: 32px 28px 26px;
      border-radius: 28px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 219, 112, 0.14), transparent 42%),
        rgba(255, 250, 250, 0.97);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
      text-align: center;
      overflow: hidden;
    }

    .loading-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 7px;
      background: linear-gradient(90deg, #9c6500 0%, #ffd76a 50%, #9c6500 100%);
    }

    .brand-box {
      width: 100%;
      max-width: 370px;
      height: 220px;
      margin: 0 auto 20px;
      padding: 8px;
      border-radius: 22px;
     background: #b60000;

    box-shadow:
      0 16px 34px rgba(90, 0, 0, 0.45),
      0 0 0 4px rgba(182, 0, 0, 0.22),
      inset 0 1px 0 rgba(255, 255, 255, 0.14);

    color: #fff;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logoPulse 2.2s ease-in-out infinite;
    }

    .brand-box img {
      width: 60%;
      height: 100%;
      object-fit: contain;

    }

    .cup-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 18px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffd85e 0%, #f4be19 100%);
      color: #3d2300;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 2.4px;
      text-transform: uppercase;
      box-shadow:
        0 8px 18px rgba(199, 139, 0, 0.20),
        inset 0 -2px 0 rgba(0, 0, 0, 0.10);
      margin-bottom: 24px;
    }

    .ball-wrap {
      position: relative;
      width: 108px;
      height: 108px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 30% 30%, #fff9d6 0%, #ffd75f 45%, #f0b000 100%);
      box-shadow:
        inset 0 4px 20px rgba(255, 255, 255, 0.35),
        0 12px 26px rgba(184, 120, 0, 0.20);
    }

    .ball-wrap::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px dashed rgba(220, 0, 0, 0.26);
      animation: spinRing 4s linear infinite;
    }

    .ball-image {
      width: 98px;
      height: 98px;
      object-fit: contain;
      animation: spinBall 1.8s linear infinite;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.22));
    }

    .title {
      margin: 0;
      color: #2b2b2b;
      font-size: 20px;
      font-weight: 900;
    }

    .subtitle {
      margin: 8px 0 22px;
      color: #666;
      font-size: 14px;
      font-weight: 600;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 11px;
      border-radius: 999px;
      overflow: hidden;
      background: #ececec;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.10);
    }

    .progress::before {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, #b90000 0%, #ef1f1f 50%, #b90000 100%);
      animation: progressMove 1.4s ease-in-out infinite;
    }

    .field-lines {
      position: absolute;
      inset: auto 0 0 0;
      height: 120px;
      opacity: 0.12;
      background:
        linear-gradient(90deg, transparent 49%, #ffffff 49%, #ffffff 51%, transparent 51%),
        radial-gradient(circle at 50% 100%, transparent 0 54px, #ffffff 55px 57px, transparent 58px),
        linear-gradient(0deg, #ffffff 2px, transparent 2px);
      background-size: 100% 100%, 100% 100%, 100% 24px;
      pointer-events: none;
    }

    @keyframes progressMove {
      0% {
        transform: translateX(-105%);
      }

      50% {
        transform: translateX(65%);
      }

      100% {
        transform: translateX(215%);
      }
    }

    @keyframes spinBall {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes spinRing {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(-360deg);
      }
    }

    @keyframes floatCup {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }

    @keyframes logoPulse {
      0%,
      100% {
        transform: scale(1);
        box-shadow:
          0 16px 34px rgba(160, 0, 0, 0.22),
          0 0 0 4px rgba(255, 215, 106, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

      50% {
        transform: scale(1.018);
        box-shadow:
          0 20px 42px rgba(160, 0, 0, 0.28),
          0 0 0 7px rgba(255, 215, 106, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
      }
    }

    @media (max-width: 520px) {
      .loading-card {
        padding: 28px 20px 22px;
        border-radius: 22px;
      }

      .brand-box {
        max-width: 330px;
        height: 112px;
        border-radius: 20px;
      }

      .brand-box img {
        border-radius: 14px;
      }

      .title {
        font-size: 18px;
      }

      .subtitle {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div id="splash-screen">
    <div class="cup-bg"></div>

    <div class="loading-card">
      <div class="brand-box">
        <img src="img/logo.png" alt="Lojas Adelino">
      </div>

      <div class="cup-label">
        Copa do Mundo 2026
      </div>

      <div class="ball-wrap">
        <img src="img/bola_copa.png" alt="Bola carregando" class="ball-image">
      </div>

      <h1 class="title">Carregando bolão</h1>
      <p class="subtitle">Preparando sua entrada na Copa...</p>

      <div class="progress"></div>
    </div>

    <div class="field-lines"></div>
  </div>

  <script>
    if (!navigator.language && !navigator.languages) {
      Object.defineProperty(navigator, 'language', { value: 'pt-BR', configurable: true });
      Object.defineProperty(navigator, 'languages', { value: ['pt-BR', 'pt', 'en'], configurable: true });
    }

    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('splash-screen');

      if (splash) {
        splash.classList.add('splash-screen--hide');

        setTimeout(function () {
          splash.remove();
        }, 500);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
